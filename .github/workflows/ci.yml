name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform
      - name: Terraform init + validate modules
        working-directory: terraform/envs/reference
        run: |
          terraform init -backend=false
          terraform validate
      - name: YAML structure check
        run: |
          python3 - <<'PY'
          import pathlib, sys
          try:
            import yaml
          except ImportError:
            import subprocess
            subprocess.check_call([sys.executable, '-m', 'pip', 'install', 'pyyaml', '-q'])
            import yaml
          roots = [pathlib.Path('k8s'), pathlib.Path('argocd'), pathlib.Path('observability')]
          errors = 0
          for root in roots:
            for path in root.rglob('*'):
              if path.suffix in {'.yaml', '.yml'}:
                try:
                  list(yaml.safe_load_all(path.read_text()))
                  print('ok', path)
                except Exception as e:
                  errors += 1
                  print('FAIL', path, e)
          sys.exit(1 if errors else 0)
          PY
      - name: Secret pattern scan
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re, sys
          patterns = [
              re.compile(r"AKIA[0-9A-Z]{16}"),
              re.compile(r"-----BEGIN [A-Z ]*PRIVATE KEY-----"),
          ]
          skip_parts = {".git", ".terraform", "node_modules"}
          hits = []
          for path in Path(".").rglob("*"):
              if not path.is_file():
                  continue
              if any(part in skip_parts for part in path.parts):
                  continue
              if path.suffix in {".png", ".jpg", ".jar", ".zip"}:
                  continue
              # Skip this workflow file — it documents the patterns intentionally.
              if path.as_posix().endswith(".github/workflows/ci.yml"):
                  continue
              try:
                  text = path.read_text(errors="ignore")
              except Exception:
                  continue
              for pat in patterns:
                  if pat.search(text):
                      hits.append(f"{path}: matched {pat.pattern}")
          if hits:
              print("\n".join(hits))
              print("Potential secret material found", file=sys.stderr)
              sys.exit(1)
          print("No high-confidence secrets detected")
          PY
