apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: payments-ref
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments-api
  template:
    metadata:
      labels:
        app: payments-api
    spec:
      serviceAccountName: payments-api
      terminationGracePeriodSeconds: 45
      containers:
        - name: api
          image: ghcr.io/example/payments-api:0.1.0
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: payments-runtime
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
